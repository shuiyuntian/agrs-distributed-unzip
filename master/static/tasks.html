<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理 - 分布式解压系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .batch-card-header {
            padding: 1rem; display: flex; align-items: center; gap: 1rem;
            background: #f9fafb; border: 1px solid var(--border);
            border-radius: 0.5rem; margin-bottom: 0.75rem; cursor: pointer;
        }
        .batch-card-header:hover { background: #f3f4f6; }
    </style>
</head>
<body>
    <header>
        <h1><span>分布式</span>解压系统</h1>
        <nav id="main-nav"></nav>
    </header>

    <div class="container">
        <div class="kpi-grid">
            <div class="kpi-card total">
                <div class="kpi-label">总批次</div>
                <div class="kpi-value" id="kpi-total">0</div>
            </div>
            <div class="kpi-card pending">
                <div class="kpi-label">等待中</div>
                <div class="kpi-value" id="kpi-pending">0</div>
            </div>
            <div class="kpi-card running">
                <div class="kpi-label">运行中</div>
                <div class="kpi-value" id="kpi-running">0</div>
            </div>
            <div class="kpi-card success">
                <div class="kpi-label">成功</div>
                <div class="kpi-value" id="kpi-success">0</div>
            </div>
            <div class="kpi-card failed">
                <div class="kpi-label">失败 / 部分成功</div>
                <div class="kpi-value" id="kpi-failed">0</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                批次列表
                <span class="live-indicator" style="margin-left:auto">
                    <span class="live-dot"></span>
                    <span id="last-update">更新中</span>
                </span>
            </div>
            <div class="toolbar">
                <select id="status-filter" onchange="loadBatches()">
                    <option value="">全部状态</option>
                    <option value="pending">等待中</option>
                    <option value="running">运行中</option>
                    <option value="paused">已暂停</option>
                    <option value="success">成功</option>
                    <option value="partial">部分成功</option>
                    <option value="failed">失败</option>
                    <option value="cancelled">已取消</option>
                </select>
                <button class="btn btn-secondary btn-sm" onclick="loadBatches()">刷新</button>
                <button class="btn btn-warning btn-sm" onclick="retryAllFailed()">重试所有失败</button>
                <button class="btn btn-danger btn-sm" onclick="clearCompleted()">清空已完成</button>
            </div>
            <div id="batch-list">
                <div style="text-align:center;color:var(--gray);padding:2rem">加载中...</div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="/static/js/auth.js"></script>
    <script>
        if (!checkAuth()) {};
        renderNav('/tasks');

        function getStatusBadge(status) {
            const map = {
                'pending': ['等待中', 'status-pending'],
                'running': ['运行中', 'status-running'],
                'success': ['成功', 'status-success'],
                'failed': ['失败', 'status-failed'],
                'partial': ['部分成功', 'status-partial'],
                'paused': ['已暂停', 'status-warning'],
                'cancelled': ['已取消', 'status-cancelled'],
                'retrying': ['待重试', 'status-retrying']
            };
            const [label, cls] = map[status] || [status, ''];
            return `<span class="status-badge ${cls}">${label}</span>`;
        }

        function formatTime(dt) {
            if (!dt) return '-';
            const d = new Date(dt.replace(' ', 'T') + 'Z');
            return d.toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'});
        }

        function formatDuration(seconds) {
            if (!seconds || seconds <= 0) return '-';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}小时 ${m}分 ${s}秒`;
            if (m > 0) return `${m}分 ${s}秒`;
            return `${s}秒`;
        }

        function renderBatchProgress(batch) {
            const total = batch.total_subtasks || 0;
            const completed = batch.completed_subtasks || 0;
            const failed = batch.failed_subtasks || 0;
            if (total === 0) return '<div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>';
            const pct = Math.min(100, ((completed + failed) / total * 100)).toFixed(1);
            let color = 'var(--primary)';
            if (batch.status === 'success') color = 'var(--success)';
            else if (batch.status === 'failed' || batch.status === 'partial' || batch.status === 'cancelled') color = 'var(--danger)';
            return `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
                    <div style="font-size:0.75rem;color:var(--gray);margin-top:2px">${completed} 已完成 / ${failed} 失败 / ${total} 总计 (${pct}%)</div>`;
        }

        async function loadBatches() {
            const statusFilter = document.getElementById('status-filter').value;
            const container = document.getElementById('batch-list');
            try {
                const url = `/api/tasks/batches?limit=100` + (statusFilter ? `&status=${statusFilter}` : '');
                const data = await apiGet(url);
                if (data.batches.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:var(--gray);padding:2rem">暂无批次</div>';
                } else {
                    container.innerHTML = data.batches.map(b => renderBatchCard(b)).join('');
                }
                updateKPI(data.counts);
                const now = new Date();
                document.getElementById('last-update').textContent = `已更新 ${now.toLocaleTimeString('zh-CN', {timeZone: 'Asia/Shanghai'})}`;
            } catch (e) {
                container.innerHTML = `<div style="text-align:center;color:var(--danger);padding:2rem">加载失败: ${e.message}</div>`;
            }
        }

        function renderBatchCard(batch) {
            const folderName = batch.input_path.split(/[\\/]/).pop() || batch.input_path;
            const created = formatTime(batch.created_at);
            let duration = '-';
            if (batch.started_at && batch.completed_at) {
                duration = formatDuration((new Date(batch.completed_at.replace(' ', 'T') + 'Z').getTime() - new Date(batch.started_at.replace(' ', 'T') + 'Z').getTime()) / 1000);
            } else if (batch.started_at) {
                duration = formatDuration((new Date().getTime() - new Date(batch.started_at.replace(' ', 'T') + 'Z').getTime()) / 1000) + ' (进行中)';
            }

            let actions = `<a href="/batch?id=${batch.id}" class="btn btn-sm btn-secondary" onclick="event.stopPropagation()">详情</a>`;
            if (batch.status === 'running' || batch.status === 'pending') {
                actions += ` <button class="btn btn-sm btn-warning" onclick="event.stopPropagation();pauseBatch(${batch.id})">暂停</button>`;
                actions += ` <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();cancelBatch(${batch.id})">取消</button>`;
            }
            if (batch.status === 'paused') {
                actions += ` <button class="btn btn-sm btn-success" onclick="event.stopPropagation();resumeBatch(${batch.id})">恢复</button>`;
                actions += ` <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();cancelBatch(${batch.id})">取消</button>`;
            }
            if (batch.status === 'failed' || batch.status === 'partial') {
                actions += ` <button class="btn btn-sm btn-warning" onclick="event.stopPropagation();retryBatch(${batch.id})">重试</button>`;
            }
            actions += ` <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteBatch(${batch.id})">删除</button>`;

            return `
                <div class="batch-card-header" onclick="window.location.href='/batch?id=${batch.id}'">
                    <div style="flex:1;min-width:0">
                        <div style="font-weight:600;margin-bottom:0.25rem">批次 #${batch.id} — ${folderName}</div>
                        <div style="font-size:0.8rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${batch.input_path}</div>
                        <div style="font-size:0.75rem;color:var(--gray);margin-top:0.25rem">提交时间: ${created}${duration !== '-' ? ` | 耗时: ${duration}` : ''}</div>
                    </div>
                    <div style="text-align:center;min-width:80px">${getStatusBadge(batch.status)}</div>
                    <div style="min-width:200px">${renderBatchProgress(batch)}</div>
                    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:flex-end;min-width:200px">${actions}</div>
                </div>
            `;
        }

        function updateKPI(counts) {
            document.getElementById('kpi-total').textContent = counts.total || 0;
            document.getElementById('kpi-pending').textContent = counts.pending || 0;
            document.getElementById('kpi-running').textContent = counts.running || 0;
            document.getElementById('kpi-success').textContent = counts.success || 0;
            document.getElementById('kpi-failed').textContent = (counts.failed || 0) + (counts.partial || 0);
        }

        async function pauseBatch(batchId) {
            try { await apiPost(`/api/tasks/batches/${batchId}/pause`, {}); showToast('批次已暂停', 'success'); loadBatches(); }
            catch (e) { showToast('暂停失败: ' + e.message, 'error'); }
        }
        async function resumeBatch(batchId) {
            try { await apiPost(`/api/tasks/batches/${batchId}/resume`, {}); showToast('批次已恢复', 'success'); loadBatches(); }
            catch (e) { showToast('恢复失败: ' + e.message, 'error'); }
        }
        async function cancelBatch(batchId) {
            if (!confirm(`取消批次 #${batchId}？`)) return;
            try { await apiPost(`/api/tasks/batches/${batchId}/cancel`, {}); showToast('批次已取消', 'success'); loadBatches(); }
            catch (e) { showToast('取消失败: ' + e.message, 'error'); }
        }
        async function retryBatch(batchId) {
            try { await apiPost(`/api/tasks/batches/${batchId}/retry`, {}); showToast('已触发批次重试', 'success'); loadBatches(); }
            catch (e) { showToast('重试失败: ' + e.message, 'error'); }
        }
        async function deleteBatch(batchId) {
            if (!confirm(`删除批次 #${batchId} 及其所有子任务？`)) return;
            try { await apiDelete(`/api/tasks/batches/${batchId}`); showToast('批次已删除', 'success'); loadBatches(); }
            catch (e) { showToast('删除失败: ' + e.message, 'error'); }
        }
        async function retryAllFailed() {
            if (!confirm('重试所有批次中的失败子任务？')) return;
            try { await apiPost('/api/tasks/retry-failed', {}); showToast('所有失败任务已加入队列', 'success'); loadBatches(); }
            catch (e) { showToast('重试失败: ' + e.message, 'error'); }
        }
        async function clearCompleted() {
            if (!confirm('清空所有已完成的批次和子任务？')) return;
            try { await apiPost('/api/tasks/clear-completed', {}); showToast('已完成记录已清空', 'success'); loadBatches(); }
            catch (e) { showToast('清空失败: ' + e.message, 'error'); }
        }

        loadBatches();
        setInterval(loadBatches, 3000);
    </script>
</body>
</html>
