<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 分布式解压系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 10vh auto;
            padding: 2rem;
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-container h1 span {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-container">
            <h1><span>分布式</span>解压系统</h1>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" value="agrsadmin">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" value="agrsadmin123">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="doLogin()">登录</button>
            <div id="error-msg" style="color:var(--danger);margin-top:1rem;text-align:center"></div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        if (getToken()) {
            window.location.href = '/tasks';
        }

        async function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            err.textContent = '';

            try {
                const params = new URLSearchParams();
                params.append('username', username);
                params.append('password', password);

                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });

                if (!resp.ok) {
                    err.textContent = '用户名或密码错误';
                    return;
                }

                const data = await resp.json();
                setToken(data.access_token);
                window.location.href = '/tasks';
            } catch (e) {
                err.textContent = '登录失败: ' + e.message;
            }
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
