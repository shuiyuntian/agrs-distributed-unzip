<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作节点详情 - 分布式解压系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
        .stat-card { background: var(--bg); padding: 0.75rem; border-radius: 0.5rem; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: var(--gray); }
        .filter-bar { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
        .pagination { display: flex; gap: 0.5rem; align-items: center; justify-content: center; margin-top: 1rem; }
        .page-btn { padding: 0.25rem 0.75rem; border: 1px solid var(--border); background: var(--card-bg); border-radius: 0.25rem; cursor: pointer; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .back-link { color: var(--primary); text-decoration: none; font-size: 0.875rem; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <h1><span>分布式</span>解压系统</h1>
        <nav id="main-nav"></nav>
    </header>

    <div class="container">
        <a href="/workers" class="back-link">&larr; 返回工作节点列表</a>

        <!-- Worker 基本信息 -->
        <div class="card" style="margin-top:1rem">
            <div class="card-title" id="worker-title">工作节点详情</div>
            <div id="worker-info" style="font-size:0.9rem;color:var(--text);line-height:1.8">
                加载中...
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stat-grid" id="stat-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-success" style="color:var(--success)">0</div>
                <div class="stat-label">成功</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-failed" style="color:var(--danger)">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-running" style="color:var(--primary)">0</div>
                <div class="stat-label">运行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-pending" style="color:var(--warning)">0</div>
                <div class="stat-label">等待中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-retrying" style="color:var(--gray)">0</div>
                <div class="stat-label">待重试</div>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="card">
            <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem">
                <span>任务清单</span>
                <div class="filter-bar">
                    <label style="font-size:0.8rem;color:var(--gray)">状态筛选:</label>
                    <select id="status-filter" onchange="onFilterChange()">
                        <option value="">全部</option>
                        <option value="pending">等待中</option>
                        <option value="running">运行中</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                        <option value="retrying">待重试</option>
                        <option value="cancelled">已取消</option>
                    </select>
                    <span style="font-size:0.8rem;color:var(--gray)" id="task-count-info"></span>
                </div>
            </div>
            <div style="overflow-x:auto">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>批次</th>
                            <th>压缩包</th>
                            <th>类型</th>
                            <th>状态</th>
                            <th>提交时间</th>
                            <th>开始时间</th>
                            <th>完成时间</th>
                            <th>耗时</th>
                            <th>重试</th>
                            <th>错误信息</th>
                        </tr>
                    </thead>
                    <tbody id="task-table-body">
                        <tr><td colspan="11" style="text-align:center;color:var(--gray)">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="/static/js/auth.js"></script>
    <script>
        if (!checkAuth()) {};
        renderNav('/workers');

        const PAGE_SIZE = 15;
        let currentPage = 0;
        let currentFilter = '';
        let workerId = null;

        function getStatusBadge(status) {
            const map = {
                'pending': ['等待中', 'status-pending'],
                'running': ['运行中', 'status-running'],
                'success': ['成功', 'status-success'],
                'failed': ['失败', 'status-failed'],
                'partial': ['部分成功', 'status-partial'],
                'paused': ['已暂停', 'status-warning'],
                'cancelled': ['已取消', 'status-cancelled'],
                'retrying': ['待重试', 'status-retrying']
            };
            const [label, cls] = map[status] || [status, ''];
            return `<span class="status-badge ${cls}">${label}</span>`;
        }

        function formatTime(dt) {
            if (!dt) return '-';
            return new Date(dt.replace(' ', 'T') + 'Z').toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'});
        }

        function formatDuration(seconds) {
            if (!seconds || seconds <= 0) return '-';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}小时 ${m}分 ${s}秒`;
            if (m > 0) return `${m}分 ${s}秒`;
            return `${s}秒`;
        }

        function getWorkerIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function loadWorkerInfo() {
            try {
                const data = await apiGet(`/api/workers/${workerId}/status`);
                const w = data.worker;
                document.getElementById('worker-title').textContent = `工作节点: ${w.hostname || w.id.substring(0, 8)}`;
                document.getElementById('worker-info').innerHTML = `
                    <strong>ID:</strong> ${w.id}<br>
                    <strong>主机名:</strong> ${w.hostname}<br>
                    <strong>IP:</strong> ${w.ip_address}<br>
                    <strong>状态:</strong> ${getStatusBadge(w.status)}<br>
                    <strong>并发配置:</strong> ${data.active_tasks}/${data.max_concurrent}<br>
                    <strong>已完成任务:</strong> ${w.total_tasks || 0}<br>
                    <strong>最后心跳:</strong> ${formatTime(w.last_heartbeat)}
                `;
            } catch (e) {
                document.getElementById('worker-info').innerHTML = '<span style="color:var(--danger)">加载失败</span>';
            }
        }

        async function loadStats() {
            try {
                const data = await apiGet(`/api/workers/${workerId}/stats`);
                const c = data.counts;
                document.getElementById('stat-total').textContent = c.total;
                document.getElementById('stat-success').textContent = c.success;
                document.getElementById('stat-failed').textContent = c.failed;
                document.getElementById('stat-running').textContent = c.running;
                document.getElementById('stat-pending').textContent = c.pending + c.retrying;
                document.getElementById('stat-retrying').textContent = c.retrying;
                return c.total;
            } catch (e) {
                return 0;
            }
        }

        async function loadTasks() {
            const tbody = document.getElementById('task-table-body');
            tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:var(--gray)">加载中...</td></tr>';
            try {
                const data = await apiGet(`/api/workers/${workerId}/all-tasks?offset=${currentPage * PAGE_SIZE}&limit=${PAGE_SIZE}&status=${currentFilter}`);
                const tasks = data.tasks;
                const total = data.total;

                const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
                document.getElementById('task-count-info').textContent = `共 ${total} 条, 第 ${currentPage + 1}/${totalPages} 页`;

                if (tasks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:var(--gray)">暂无任务</td></tr>';
                } else {
                    tbody.innerHTML = tasks.map(t => {
                        let dur = '-';
                        if (t.started_at && t.completed_at) {
                            dur = formatDuration((new Date(t.completed_at.replace(' ', 'T') + 'Z').getTime() - new Date(t.started_at.replace(' ', 'T') + 'Z').getTime()) / 1000);
                        } else if (t.started_at) {
                            dur = formatDuration((new Date().getTime() - new Date(t.started_at.replace(' ', 'T') + 'Z').getTime()) / 1000) + ' (进行中)';
                        }
                        const archiveName = t.input_path ? t.input_path.split(/[\\/]/).pop() : '-';
                        return `
                            <tr>
                                <td>${t.id}</td>
                                <td>${t.batch_id || '-'}</td>
                                <td title="${t.input_path || ''}">${archiveName}</td>
                                <td>${t.archive_type || '-'}</td>
                                <td>${getStatusBadge(t.status)}</td>
                                <td>${formatTime(t.created_at)}</td>
                                <td>${formatTime(t.started_at)}</td>
                                <td>${formatTime(t.completed_at)}</td>
                                <td>${dur}</td>
                                <td>${t.retry_count}</td>
                                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.error_message || ''}">${t.error_message || '-'}</td>
                            </tr>
                        `;
                    }).join('');
                }

                renderPagination(total);
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;color:var(--danger)">加载失败</td></tr>`;
            }
        }

        function renderPagination(total) {
            const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
            let html = '';
            html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 0; i < totalPages; i++) {
                if (i === currentPage) {
                    html += `<button class="page-btn active">${i + 1}</button>`;
                } else if (i === 0 || i === totalPages - 1 || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn" onclick="goPage(${i})">${i + 1}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span style="color:var(--gray)">...</span>`;
                }
            }
            html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>下一页</button>`;
            document.getElementById('pagination').innerHTML = html;
        }

        function goPage(page) {
            const totalPages = Math.ceil(parseInt(document.getElementById('stat-total').textContent) / PAGE_SIZE) || 1;
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            loadTasks();
        }

        function onFilterChange() {
            currentFilter = document.getElementById('status-filter').value;
            currentPage = 0;
            loadTasks();
        }

        async function init() {
            workerId = getWorkerIdFromUrl();
            if (!workerId) {
                document.body.innerHTML = '<div class="container"><div style="color:var(--danger);padding:2rem">缺少 Worker ID 参数</div></div>';
                return;
            }
            await loadWorkerInfo();
            await loadStats();
            await loadTasks();
        }

        init();
        setInterval(() => { loadStats(); loadTasks(); }, 3000);
    </script>
</body>
</html>
